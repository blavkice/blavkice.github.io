<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Experience - blavkice portfolio.">
    <meta name="theme-color" content="#0f1214">
    <title>experience</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div class="page">
        <header class="hero hero--single">
            <div class="hero__content">
                <p class="eyebrow reveal" style="--delay: 0ms">Experience</p>
                <h1 class="hero__title reveal" style="--delay: 80ms">Experience</h1>
                <p class="hero__subtitle reveal" style="--delay: 140ms">current role and responsibilities</p>
                <div class="hero__actions reveal" style="--delay: 200ms">
                    <a class="button button--ghost" href="index.html">projects</a>
                    <a class="button button--ghost button--active" href="experience.html">experience</a>
                    <a class="button button--ghost" href="education.html">education</a>
                    <a class="button button--ghost" href="https://github.com/blavkice" target="_blank" rel="noopener noreferrer">GitHub</a>
                </div>
            </div>
        </header>

        <main id="main-content">
            <section class="section" aria-label="Experience">
                <div class="projects-grid" role="list">
                    <article class="project-card project-card--profile" role="listitem">
                        <div class="project-card__header">
                            <div class="project-card__text">
                                <h3 class="project-card__title">Vertiv</h3>
                                <p class="project-card__role">IT Intern</p>
                            </div>
                            <div class="badge badge--vertiv" aria-hidden="true">V</div>
                        </div>
                        <p class="project-card__desc">currently interning at Vertiv as an IT Intern :)</p>
                    </article>
                </div>
            </section>
        </main>

        <footer class="footer" role="contentinfo">
            <p>&copy; <span id="current-year">2025</span> blavkice</p>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
